    <clipPath id="panel1"><rect x="50" y="50" width="700" height="800" rx="26"/></clipPath>
    <clipPath id="panel2"><rect x="790" y="50" width="760" height="380" rx="26"/></clipPath>
    <clipPath id="panel3"><rect x="790" y="470" width="760" height="380" rx="26"/></clipPath>
  </defs>

  <rect width="1600" height="900" fill="#fff"/>
