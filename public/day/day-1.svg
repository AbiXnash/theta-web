  <rect x="50" y="50" width="700" height="800" rx="26" fill="#fff" stroke="#000" stroke-width="12"/>
  <rect x="790" y="50" width="760" height="380" rx="26" fill="#fff" stroke="#000" stroke-width="12"/>
  <rect x="790" y="470" width="760" height="380" rx="26" fill="#fff" stroke="#000" stroke-width="12"/>

  <g clip-path="url(#panel1)">
