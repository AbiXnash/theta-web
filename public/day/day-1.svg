    </g>
    <ellipse cx="405" cy="710" rx="270" ry="190" fill="#000"/>
    <ellipse cx="405" cy="445" rx="190" ry="210" fill="#000"/>
    <path d="M275 470 Q405 560 535 470" stroke="#fff" stroke-width="12" stroke-linecap="round"/>
    <circle cx="338" cy="405" r="18" fill="#fff"/>
    <circle cx="472" cy="405" r="18" fill="#fff"/>
    <path d="M320 330 Q405 250 490 330" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
  </g>

  <g clip-path="url(#panel2)">
